<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>色カードナラティブ</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f3ee;
    --bg2: #ede8e0;
    --text: #2a2018;
    --muted: #9a8e80;
    --border: rgba(42,32,24,0.1);
    --card-shadow: 0 8px 32px rgba(42,32,24,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f0e8;
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', 'Hiragino Kaku Gothic ProN', 'ヒラギノ角ゴ ProN W3', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 40% at 10% 0%, rgba(200,170,120,0.28) 0%, transparent 50%),
      radial-gradient(ellipse 60% 50% at 90% 100%, rgba(150,180,200,0.18) 0%, transparent 50%);
    pointer-events: none;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeUp 0.8s ease;
  }

  h1 {
    font-family: 'Shippori Mincho', serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 5px;
    color: var(--text);
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
  }

  /* プログレス */
  .progress {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
    justify-content: center;
  }

  .progress-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
    border: 1px solid rgba(42,32,24,0.15);
    transition: all 0.4s ease;
  }

  .progress-dot.done {
    border-color: transparent;
  }

  /* カードグリッド */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    max-width: 360px;
    width: 100%;
    margin-bottom: 24px;
  }

  .q-card {
    height: 88px;
    border-radius: 14px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    border: 1.5px dashed rgba(42,32,24,0.18);
    background: white;
    box-shadow: var(--card-shadow);
    position: relative;
    overflow: hidden;
  }

  .q-card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .q-card:hover:not(.drawn) {
    transform: translateY(-3px);
    box-shadow: 0 16px 40px rgba(42,32,24,0.16);
  }

  .q-card.drawn {
    border-style: solid;
    cursor: default;
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .q-label {
    font-size: 10px;
    letter-spacing: 2px;
    transition: color 0.3s;
    position: relative;
    z-index: 1;
  }

  .q-question {
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--muted);
    position: relative;
    z-index: 1;
  }

  .q-mark {
    font-size: 22px;
    color: rgba(42,32,24,0.2);
    position: relative;
    z-index: 1;
  }

  .q-orb {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    position: relative;
    z-index: 1;
  }

  .q-color-name {
    font-family: 'Shippori Mincho', serif;
    font-size: 13px;
    font-weight: 600;
    color: white;
    letter-spacing: 2px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.3);
    position: relative;
    z-index: 1;
  }

  /* 選ばれた言葉リスト */
  .words-list {
    max-width: 360px;
    width: 100%;
    margin-bottom: 20px;
  }

  .word-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 9px 14px;
    margin-bottom: 6px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(42,32,24,0.07);
    animation: slideIn 0.3s ease;
    border-left: 3px solid transparent;
  }

  .word-q {
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--muted);
    min-width: 30px;
    flex-shrink: 0;
  }

  .word-text {
    font-size: 12px;
    letter-spacing: 0.5px;
    color: var(--text);
    line-height: 1.5;
  }

  /* 生成ボタン */
  .btn-generate {
    background: linear-gradient(135deg, #2a2018, #4a3828);
    border: none;
    border-radius: 40px;
    color: #f0ece4;
    padding: 15px 48px;
    font-family: 'Zen Kaku Gothic New', 'Hiragino Kaku Gothic ProN', 'ヒラギノ角ゴ ProN W3', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    cursor: pointer;
    box-shadow: 0 8px 28px rgba(42,32,24,0.25);
    transition: all 0.3s ease;
    animation: pulse 2s infinite;
    margin-bottom: 32px;
  }

  .btn-generate:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 36px rgba(42,32,24,0.3);
  }

  /* ナラティブ結果 */
  .result {
    max-width: 360px;
    width: 100%;
    animation: fadeUp 0.6s ease;
  }

  .palette {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 24px;
  }

  .palette-dot {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    box-shadow: 0 4px 14px rgba(0,0,0,0.15);
  }

  .story-box {
    background: white;
    border-radius: 20px;
    padding: 32px 24px;
    text-align: center;
    box-shadow: 0 12px 40px rgba(42,32,24,0.1);
    margin-bottom: 16px;
  }

  .story-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .story-text {
    font-family: 'Shippori Mincho', serif;
    font-size: 15px;
    line-height: 2.4;
    letter-spacing: 1px;
    color: var(--text);
    white-space: pre-line;
  }

  .copy-hint {
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 20px;
  }

  .btn-reset {
    width: 100%;
    background: transparent;
    border: 1.5px solid rgba(42,32,24,0.2);
    border-radius: 40px;
    color: var(--muted);
    padding: 13px;
    font-family: 'Zen Kaku Gothic New', 'Hiragino Kaku Gothic ProN', 'ヒラギノ角ゴ ProN W3', sans-serif;
    font-size: 12px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .btn-reset:hover {
    border-color: var(--text);
    color: var(--text);
  }

  .btn-copy {
    width: 100%;
    background: #f0ece4;
    border: 1px solid rgba(42,32,24,0.15);
    border-radius: 40px;
    color: var(--text);
    padding: 13px;
    font-family: 'Zen Kaku Gothic New', 'Hiragino Kaku Gothic ProN', 'ヒラギノ角ゴ ProN W3', sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-bottom: 10px;
  }

  .btn-copy:hover {
    background: var(--bg2);
  }

  .hidden { display: none; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes popIn {
    0% { transform: scale(0.85); opacity: 0.5; }
    100% { transform: scale(1); opacity: 1; }
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 8px 28px rgba(42,32,24,0.25); }
    50% { box-shadow: 0 8px 36px rgba(42,32,24,0.38); }
  }
</style>
</head>
<body>

<header>
  <h1>色カードナラティブ</h1>
  <p class="subtitle">カードをめくって、あなたの物語を紡ぐ</p>
</header>

<div class="progress" id="progress"></div>

<div id="drawingSection">
  <div class="cards-grid" id="cardsGrid"></div>
  <div class="words-list" id="wordsList"></div>
  <button class="btn-generate hidden" id="generateBtn" onclick="generateNarrative()">
    ✦ ナラティブを紡ぐ
  </button>
</div>

<div class="result hidden" id="resultSection">
  <div class="palette" id="palette"></div>
  <div class="story-box">
    <div class="story-label">あなたの今日の物語</div>
    <div class="story-text" id="storyText"></div>
  </div>
  <p class="copy-hint">↓ Veo3 / Flova へのプロンプトとしてもお使いいただけます</p>
  <button class="btn-copy" onclick="copyStory()">物語をコピーする</button>
  <button class="btn-reset" onclick="resetApp()">もう一度引く</button>
</div>

      誰が: ["優しさを知る人が", "自分を愛することを学んだ人が", "赦すことを選んだ者が", "愛を惜しみなく与える人が", "心の柔らかさを持つ人が"],

const questions = ["いつ", "どこで", "誰が", "何を", "なぜ", "どうした"];
let selections = {};
let drawnCount = 0;

function init() {
  selections = {};
  drawnCount = 0;

  // プログレス
  const prog = document.getElementById('progress');
  prog.innerHTML = questions.map(() => '<div class="progress-dot"></div>').join('');

  // カードグリッド
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = questions.map((q, i) => `
    <div class="q-card" id="card-${i}" onclick="drawCard(${i}, '${q}')">
      <div class="q-label" id="label-${i}" style="color:var(--muted)">${q}</div>
      <div class="q-mark" id="mark-${i}">？</div>
    </div>
  `).join('');

  document.getElementById('wordsList').innerHTML = '';
  document.getElementById('generateBtn').classList.add('hidden');
  document.getElementById('drawingSection').classList.remove('hidden');
  document.getElementById('resultSection').classList.add('hidden');
}

function drawCard(index, question) {
  const card = document.getElementById(`card-${index}`);
  if (card.classList.contains('drawn')) return;

  const color = colors[Math.floor(Math.random() * colors.length)];
  const keyword = color.keywords[question][Math.floor(Math.random() * color.keywords[question].length)];

  selections[question] = { color, keyword };
  drawnCount++;

  // カードを更新
  card.classList.add('drawn');
  card.style.background = `linear-gradient(145deg, ${color.hex}dd, ${color.hex}99)`;
  card.style.borderColor = color.hex;
  card.style.boxShadow = `0 8px 24px ${color.hex}44`;

  document.getElementById(`label-${index}`).style.color = 'rgba(255,255,255,0.7)';
  document.getElementById(`mark-${index}`).innerHTML = `
    <div style="width:22px;height:22px;border-radius:50%;background:${color.hex};box-shadow:0 0 10px ${color.hex};margin-bottom:4px;"></div>
    <div style="font-family:'Shippori Mincho',serif;font-size:12px;font-weight:600;color:white;letter-spacing:1px;">${color.name}</div>
  `;

  // プログレス更新
  const dots = document.querySelectorAll('.progress-dot');
  dots[drawnCount - 1].classList.add('done');
  dots[drawnCount - 1].style.background = color.hex;

  // 言葉リスト追加
  const list = document.getElementById('wordsList');
  const row = document.createElement('div');
  row.className = 'word-row';
  row.style.borderLeftColor = color.hex;
  row.innerHTML = `
    <span class="word-q">${question}</span>
    <span class="word-text">${keyword}</span>
  `;
  list.appendChild(row);

  // 全部引いたら生成ボタン表示
  if (drawnCount === questions.length) {
    document.getElementById('generateBtn').classList.remove('hidden');
  }
}

function generateNarrative() {
  const parts = questions.map(q => selections[q]?.keyword || '');
  const story = `${parts[0]}、\n${parts[1]}、\n${parts[2]}は\n${parts[3]}手にした。\n\n${parts[4]}——\n${parts[5]}。`;

  document.getElementById('storyText').textContent = story;

  // パレット
  const palette = document.getElementById('palette');
  palette.innerHTML = questions.map(q =>
    `<div class="palette-dot" style="background:${selections[q].color.hex};box-shadow:0 4px 14px ${selections[q].color.hex}55;"></div>`
  ).join('');

  document.getElementById('drawingSection').classList.add('hidden');
  document.getElementById('resultSection').classList.remove('hidden');
}

function copyStory() {
  const text = document.getElementById('storyText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn-copy');
    btn.textContent = 'コピーしました ✓';
    setTimeout(() => btn.textContent = '物語をコピーする', 2000);
  });
}

function resetApp() {
  init();
}

// 初期化
init();
