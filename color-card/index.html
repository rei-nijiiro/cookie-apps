
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>色カードナラティブ</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f0e8;
    color: #2a2018;
    font-family: 'Zen Kaku Gothic New', 'Hiragino Kaku Gothic ProN', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 70% 50% at 15% 10%, rgba(200,160,100,0.2) 0%, transparent 55%),
      radial-gradient(ellipse 60% 50% at 85% 90%, rgba(150,180,200,0.15) 0%, transparent 55%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 680px;
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  h1 {
    font-family: 'Shippori Mincho', 'Hiragino Mincho ProN', serif;
    font-size: clamp(22px, 4vw, 36px);
    font-weight: 600;
    letter-spacing: 6px;
    color: #2a2018;
    margin-bottom: 8px;
  }

  .subtitle {
    font-size: clamp(14px, 2vw, 18px);
    letter-spacing: 2px;
    color: #9a8e80;
  }

  .progress {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
    justify-content: center;
  }

  .progress-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(42,32,24,0.12);
    border: 1px solid rgba(42,32,24,0.2);
    transition: all 0.4s ease;
  }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: clamp(10px, 2vw, 20px);
    width: 100%;
    margin-bottom: 24px;
  }

  .q-card {
    aspect-ratio: 2/3;
    border-radius: 16px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    border: 1.5px dashed rgba(42,32,24,0.2);
    background: rgba(255,255,255,0.85);
    box-shadow: 0 4px 20px rgba(42,32,24,0.08);
    padding: 12px;
  }

  .q-card:hover:not(.drawn) {
    transform: translateY(-4px);
    box-shadow: 0 12px 32px rgba(42,32,24,0.14);
  }

  .q-card.drawn {
    border-style: solid;
    cursor: default;
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .q-label {
    font-size: clamp(13px, 1.8vw, 16px);
    letter-spacing: 2px;
    color: #9a8e80;
  }

  .q-card.drawn .q-label {
    color: rgba(255,255,255,0.7);
  }

  .q-mark {
    font-size: clamp(26px, 4vw, 36px);
    color: rgba(42,32,24,0.18);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .words-list {
    width: 100%;
    margin-bottom: 20px;
  }

  .word-row {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 10px 16px;
    margin-bottom: 6px;
    background: rgba(255,255,255,0.8);
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(42,32,24,0.07);
    border-left: 3px solid transparent;
    animation: slideIn 0.3s ease;
  }

  .word-q {
    font-size: clamp(10px, 1.5vw, 12px);
    letter-spacing: 1px;
    color: #9a8e80;
    min-width: 36px;
    flex-shrink: 0;
  }

  .word-text {
    font-size: clamp(12px, 1.8vw, 15px);
    letter-spacing: 0.5px;
    color: #2a2018;
    line-height: 1.6;
  }

  .btn-generate {
    background: linear-gradient(135deg, #2a2018, #4a3828);
    border: none;
    border-radius: 40px;
    color: #f0ece4;
    padding: 16px 56px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: clamp(13px, 1.8vw, 16px);
    letter-spacing: 3px;
    cursor: pointer;
    box-shadow: 0 8px 28px rgba(42,32,24,0.25);
    transition: all 0.3s ease;
    margin-bottom: 32px;
    animation: pulse 2s infinite;
  }

  .btn-generate:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 36px rgba(42,32,24,0.32);
  }

  .hidden { display: none; }

  /* 結果画面 */
  .result { width: 100%; }

  .palette {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 28px;
  }

  .palette-dot {
    width: clamp(32px, 5vw, 48px);
    height: clamp(32px, 5vw, 48px);
    border-radius: 50%;
    box-shadow: 0 4px 14px rgba(0,0,0,0.15);
  }

  .story-box {
    background: rgba(255,255,255,0.9);
    border-radius: 24px;
    padding: clamp(24px, 4vw, 48px);
    text-align: center;
    box-shadow: 0 12px 40px rgba(42,32,24,0.1);
    margin-bottom: 16px;
  }

  .story-label {
    font-size: clamp(10px, 1.5vw, 12px);
    letter-spacing: 3px;
    color: #9a8e80;
    margin-bottom: 20px;
  }

  .story-text {
    font-family: 'Shippori Mincho', 'Hiragino Mincho ProN', serif;
    font-size: clamp(15px, 2.2vw, 22px);
    line-height: 2.6;
    letter-spacing: 1.5px;
    color: #2a2018;
    white-space: pre-line;
  }

  .copy-hint {
    font-size: clamp(10px, 1.5vw, 12px);
    letter-spacing: 1px;
    color: #9a8e80;
    text-align: center;
    margin-bottom: 16px;
  }

  .btn-copy {
    width: 100%;
    background: #f0ece4;
    border: 1px solid rgba(42,32,24,0.15);
    border-radius: 40px;
    color: #2a2018;
    padding: 14px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: clamp(12px, 1.5vw, 14px);
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-bottom: 10px;
  }

  .btn-copy:hover { background: #e8e0d4; }

  .btn-reset {
    width: 100%;
    background: transparent;
    border: 1.5px solid rgba(42,32,24,0.2);
    border-radius: 40px;
    color: #9a8e80;
    padding: 14px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: clamp(12px, 1.5vw, 14px);
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .btn-reset:hover { border-color: #2a2018; color: #2a2018; }

  @keyframes popIn {
    0% { transform: scale(0.85); opacity: 0.5; }
    100% { transform: scale(1); opacity: 1; }
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 8px 28px rgba(42,32,24,0.25); }
    50% { box-shadow: 0 8px 36px rgba(42,32,24,0.4); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>色カードナラティブ</h1>
    <p class="subtitle">カードをめくって、あなたの物語を紡ぐ</p>
  </header>

  <div class="progress" id="progress"></div>

  <div id="drawingSection" style="width:100%;display:flex;flex-direction:column;align-items:center;">
    <div class="cards-grid" id="cardsGrid"></div>
    <div class="words-list" id="wordsList"></div>
    <button class="btn-generate hidden" id="generateBtn" onclick="generateNarrative()">
      ✦ ナラティブを紡ぐ
    </button>
  </div>

  <div class="result hidden" id="resultSection">
    <div class="palette" id="palette"></div>
    <div class="story-box">
      <div class="story-label">あなたの今日の物語</div>
      <div class="story-text" id="storyText"></div>
    </div>
    <p class="copy-hint">↓ Veo3 / Flova へのプロンプトとしてもお使いいただけます</p>
    <button class="btn-copy" onclick="copyStory()">物語をコピーする</button>
    <button class="btn-reset" onclick="resetApp()">もう一度引く</button>
  </div>

</div>

<script>
const colors = [
  { name: "赤", hex: "#E03030",
    keywords: {
      いつ: ["情熱が燃えた夜に", "決意の夜明けに", "はじまりの朝に", "炎のような午後に", "覚醒の瞬間に"],
      どこで: ["赤く染まる夕焼けの丘で", "燃える暖炉の前で", "情熱の渦巻く場所で", "力強い大地の上で", "扉の前で"],
      誰が: ["炎のような意志を持つ人が", "誓いを立てた旅人が", "本気の瞳を持つ者が", "情熱を隠せない人が", "はじまりを恐れない人が"],
      何を: ["大切な誓いを", "隠していた本音を", "燃えるような希望を", "最初の一歩を", "心の扉を"],
      なぜ: ["もう迷わないと決めたから", "その炎を絶やしたくなかったから", "本気を見せる時だと知ったから", "それが自分らしさだから", "情熱が溢れて止まらなかったから"],
      どうした: ["静かに、しかし力強く踏み出した", "炎のように前へ進んだ", "迷わず決断した", "その熱を言葉にした", "ありのままに、ぶつかった"]
    }
  },
  { name: "橙", hex: "#E8721A",
    keywords: {
      いつ: ["新しい季節のはじまりに", "賑やかな午後に", "出会いが重なる日に", "つながりが生まれた朝に", "温もりを感じた夕暮れに"],
      どこで: ["賑やかな市場の片隅で", "人が集まる広場で", "温かな食卓の前で", "交差点の真ん中で", "笑い声が溢れる場所で"],
      誰が: ["笑顔を武器にする旅人が", "誰とでも打ち解ける人が", "橋を渡し続ける者が", "つながりを大切にする人が", "温もりを運ぶ人が"],
      何を: ["小さな勇気を", "あたたかい言葉を", "共に過ごす時間を", "笑顔という贈り物を", "絆の糸を"],
      なぜ: ["変わりたいと願っていたから", "誰かを笑顔にしたかったから", "つながりの大切さを知っていたから", "温かさを伝えたかったから", "一人じゃないと気づいたから"],
      どうした: ["思い切って声をかけた", "手を差し伸べた", "笑いかけた", "橋を架けた", "共に歩きはじめた"]
    }
  },
  { name: "黄", hex: "#C8A800",
    keywords: {
      いつ: ["光が満ちた昼下がりに", "好奇心が溢れた朝に", "閃きが訪れた瞬間に", "学びが深まった日に", "発見の午前中に"],
      どこで: ["古い図書館の窓辺で", "光差し込む部屋の中で", "広い空の下で", "知恵が集まる場所で", "自由な空間の中で"],
      誰が: ["才能を隠していた人が", "ひたむきに学ぶ者が", "好奇心を持ち続ける人が", "小さな発見を喜ぶ人が", "輝くことを恐れていた人が"],
      何を: ["隠していた才能を", "長年の疑問を", "新しいアイデアを", "輝く可能性を", "忘れていた夢を"],
      なぜ: ["輝くべき時だと気づいたから", "もう隠さなくていいと知ったから", "好奇心が抑えられなかったから", "学ぶことが喜びだと気づいたから", "自分を信じてみたかったから"],
      どうした: ["ゆっくりと世界に見せ始めた", "思い切って試してみた", "知識を分かち合った", "素直に喜んだ", "一歩踏み出した"]
    }
  },
  { name: "緑", hex: "#3A9E50",
    keywords: {
      いつ: ["雨上がりの静かな朝に", "根を張る季節に", "穏やかな時間が流れる中で", "呼吸が深まった夕方に", "自然が語りかける日に"],
      どこで: ["深い森の木陰で", "静かな庭の片隅で", "緑が溢れる野原で", "土の匂いがする場所で", "時間がゆっくり流れる場所で"],
      誰が: ["根を張ることを知る者が", "静けさの中に力を持つ人が", "自然と話せる者が", "癒しを運ぶ人が", "待つことを知っている人が"],
      何を: ["長い沈黙を", "大切な種を", "癒しの言葉を", "静かな力を", "土台という名の信念を"],
      なぜ: ["土台を作ることが先だと知っていたから", "焦ることの無意味さを知っていたから", "自然のリズムを信じていたから", "根を張らずに咲けないと知っていたから", "静けさの中に答えがあると知っていたから"],
      どうした: ["ただ、待ち続けた", "深く根を張った", "静かに育み続けた", "呼吸を整えた", "土に還るように、受け入れた"]
    }
  },
  { name: "青", hex: "#2060C8",
    keywords: {
      いつ: ["星が流れる夜明け前に", "静寂が訪れた深夜に", "使命を感じた朝に", "言葉が降りてきた瞬間に", "深く考えた長い午後に"],
      どこで: ["海と空が溶け合う場所で", "静かな書斎の中で", "言葉が生まれる場所で", "誠実さが宿る空間で", "深い水の底のような場所で"],
      誰が: ["流れを読む者が", "言葉を大切にする人が", "静かな信頼を持つ者が", "誠実さを貫く人が", "本質を見抜く者が"],
      何を: ["古い地図を", "大切な言葉を", "静かな信頼を", "内なる使命を", "誠実さという鎧を"],
      なぜ: ["新しい道を見つけたかったから", "誠実さだけが残ると知っていたから", "言葉が人を救うと信じていたから", "本質を見失いたくなかったから", "静かな力が一番強いと知っていたから"],
      どうした: ["川のように進み続けた", "言葉を丁寧に選んだ", "静かに、しかし確実に歩んだ", "誠実に向き合い続けた", "深く、本質を問い続けた"]
    }
  },
  { name: "紫", hex: "#7A40B0",
    keywords: {
      いつ: ["夢と現実の境で", "直感が囁いた夜に", "神秘が訪れた瞬間に", "魂が揺れた夜明けに", "言葉にならない何かを感じた時に"],
      どこで: ["霧に包まれた庭園で", "夢の中のような場所で", "見えない境界線の上で", "神秘が宿る空間で", "静寂と音楽が交わる場所で"],
      誰が: ["見えないものが見える人が", "直感という羅針盤を持つ者が", "魂の声を聞ける人が", "神秘に怯えない者が", "美しさに敏感な人が"],
      何を: ["直感という名の羅針盤を", "見えない何かを", "魂の声を", "神秘という名の答えを", "美しさの本質を"],
      なぜ: ["理屈では説明できない何かを感じたから", "魂が教えてくれたから", "美しいと感じることが真実だから", "直感を裏切りたくなかったから", "見えないものが見えていたから"],
      どうした: ["その声に従って歩いた", "論理より先に、感じた", "神秘の中に身を委ねた", "夢と現実を行き来した", "美しさを信じて進んだ"]
    }
  },
  { name: "ピンク", hex: "#D04888",
    keywords: {
      いつ: ["やわらかな春の午後に", "愛が満ちた瞬間に", "赦しが訪れた朝に", "自分を好きになれた日に", "優しさが溢れた夕暮れに"],
      どこで: ["花びらが舞う道の途中で", "温かな光の中で", "愛が宿る場所で", "自分だけの安心な空間で", "やさしさが満ちる場所で"],
      誰が: ["優しさを知る人が", "自分を愛することを学んだ人が", "赦すことを選んだ者が", "愛を惜しみなく与える人が", "心の柔らかさを持つ人が"],
      何を: ["差し伸べた手を", "自分への愛を", "赦しという贈り物を", "柔らかな言葉を", "ありのままの自分を"],
      なぜ: ["それが自然なことだったから", "愛することが強さだと知っていたから", "自分を大切にすることが先だと気づいたから", "赦しが自由をくれると知っていたから", "やさしさが世界を変えると信じていたから"],
      どうした: ["ただ、そっと寄り添った", "自分を優しく抱きしめた", "赦して、前へ進んだ", "愛を、言葉にした", "ありのままで、いることを選んだ"]
    }
  }
];

const questions = ["いつ", "どこで", "誰が", "何を", "なぜ", "どうした"];
let selections = {};
let drawnCount = 0;

function init() {
  selections = {};
  drawnCount = 0;

  const prog = document.getElementById('progress');
  prog.innerHTML = questions.map(() => '<div class="progress-dot"></div>').join('');

  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = questions.map((q, i) => `
    <div class="q-card" id="card-${i}" onclick="drawCard(${i}, '${q}')">
      <div class="q-label" id="label-${i}">${q}</div>
      <div class="q-mark" id="mark-${i}">？</div>
    </div>
  `).join('');

  document.getElementById('wordsList').innerHTML = '';
  document.getElementById('generateBtn').classList.add('hidden');
  document.getElementById('drawingSection').style.display = 'flex';
  document.getElementById('resultSection').classList.add('hidden');
}

function drawCard(index, question) {
  const card = document.getElementById(`card-${index}`);
  if (card.classList.contains('drawn')) return;

  const color = colors[Math.floor(Math.random() * colors.length)];
  const kws = color.keywords[question];
  const keyword = kws[Math.floor(Math.random() * kws.length)];

  selections[question] = { color, keyword };
  drawnCount++;

  card.classList.add('drawn');
  card.style.background = `linear-gradient(145deg, ${color.hex}ee, ${color.hex}99)`;
  card.style.borderColor = color.hex;
  card.style.boxShadow = `0 8px 24px ${color.hex}44`;

  document.getElementById(`label-${index}`).style.color = 'rgba(255,255,255,0.7)';
  document.getElementById(`mark-${index}`).innerHTML = `
    <div style="width:clamp(20px,3vw,30px);height:clamp(20px,3vw,30px);border-radius:50%;background:${color.hex};box-shadow:0 0 12px ${color.hex};"></div>
    <div style="font-size:clamp(11px,1.6vw,14px);font-weight:600;color:white;letter-spacing:1px;margin-top:4px;">${color.name}</div>
  `;

  const dots = document.querySelectorAll('.progress-dot');
  dots[drawnCount - 1].classList.add('done');
  dots[drawnCount - 1].style.background = color.hex;
  dots[drawnCount - 1].style.borderColor = 'transparent';

  const list = document.getElementById('wordsList');
  const row = document.createElement('div');
  row.className = 'word-row';
  row.style.borderLeftColor = color.hex;
  row.innerHTML = `<span class="word-q">${question}</span><span class="word-text">${keyword}</span>`;
  list.appendChild(row);

  if (drawnCount === questions.length) {
    document.getElementById('generateBtn').classList.remove('hidden');
  }
}

function generateNarrative() {
  const parts = questions.map(q => selections[q]?.keyword || '');
  const story = `${parts[0]}、\n${parts[1]}、\n${parts[2]}\n${parts[3]}手にした。\n\n${parts[4]}——\n${parts[5]}。`;

  document.getElementById('storyText').textContent = story;

  const palette = document.getElementById('palette');
  palette.innerHTML = questions.map(q =>
    `<div class="palette-dot" style="background:${selections[q].color.hex};box-shadow:0 4px 14px ${selections[q].color.hex}55;"></div>`
  ).join('');

  document.getElementById('drawingSection').style.display = 'none';
  document.getElementById('resultSection').classList.remove('hidden');
}

function copyStory() {
  const text = document.getElementById('storyText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn-copy');
    btn.textContent = 'コピーしました ✓';
    setTimeout(() => btn.textContent = '物語をコピーする', 2000);
  });
}

function resetApp() { init(); }

init();
</script>
</body>
</html>
